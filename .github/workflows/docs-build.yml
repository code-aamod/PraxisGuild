name: Build Docs

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up pandoc and LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-xetex

    - name: Install WeasyPrint
      run: |
        sudo apt-get install -y python3-pip python3-cffi python3-pango
        pip3 install weasyprint --break-system-packages

    - name: Build PDFs
      run: |
        bash scripts/build_docs.sh

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: docs-pdfs
        path: build/docs/