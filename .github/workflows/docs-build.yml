name: Build Docs

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest # Change to your self-hosted arch runner if applicable
    steps:
    - uses: actions/checkout@v4

    - name: Set up pandoc and LaTeX
      run: |
        sudo pacman -Syu --noconfirm pandoc texlive-core

    - name: Install WeasyPrint on Arch
      run: |
        sudo pacman -S --noconfirm python-weasyprint

    - name: Build PDFs
      run: |
        bash scripts/build_docs.sh

    - name: Upload PDFs
      uses: actions/upload-artifact@v4
      with:
        name: docs-pdfs
        path: build/docs/